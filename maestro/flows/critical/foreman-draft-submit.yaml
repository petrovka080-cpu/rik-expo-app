appId: com.azisbek_dzhantaev.rikexpoapp
name: Foreman Draft Submit
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "auth.login.email"
    timeout: 15000
- tapOn:
    id: "auth.login.email"
- inputText: ${E2E_FOREMAN_EMAIL}
- tapOn:
    id: "auth.login.password"
- inputText: ${E2E_FOREMAN_PASSWORD}
- hideKeyboard
- tapOn:
    id: "auth.login.submit"
- extendedWaitUntil:
    visible:
      id: "profile-edit-open"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "profile-open-office-access"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 20
    centerElement: true
- tapOn:
    id: "profile-open-office-access"
- extendedWaitUntil:
    visible:
      id: "office-direction-open-foreman"
    timeout: 30000
- tapOn:
    id: "office-direction-open-foreman"
# After entering foreman role, wait for the materials tab to be ready
- extendedWaitUntil:
    visible:
      id: "foreman-main-materials-open"
    timeout: 30000
- tapOn:
    id: "foreman-main-materials-open"
# FIO bootstrap: with clearState:true, the async bootstrap
# (getUser + loadStoredFioState) SHOULD open the FIO modal.
# We wait for the object dropdown as a bootstrap-complete signal,
# because both the FIO modal and the dropdown are in ForemanMaterialsContent.
# If the FIO modal appears on the way, it blocks scrolling, so we handle it.
- extendedWaitUntil:
    visible:
      id: "warehouse-fio-input"
    timeout: 10000
- tapOn:
    id: "warehouse-fio-input"
- eraseText
- inputText: ${E2E_FOREMAN_FIO}
- hideKeyboard
- tapOn:
    id: "warehouse-fio-confirm"
- waitForAnimationToEnd
# Now select object
- scrollUntilVisible:
    element:
      id: "foreman-dropdown-open-foreman-object"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 20
    centerElement: true
- tapOn:
    id: "foreman-dropdown-open-foreman-object"
- extendedWaitUntil:
    visible:
      id: "foreman-dropdown-option-foreman-object-${E2E_FOREMAN_OBJECT_CODE_TOKEN}"
    timeout: 30000
- tapOn:
    id: "foreman-dropdown-option-foreman-object-${E2E_FOREMAN_OBJECT_CODE_TOKEN}"
- waitForAnimationToEnd
# Now select locator
- scrollUntilVisible:
    element:
      id: "foreman-dropdown-open-foreman-locator"
    direction: UP
    timeout: 20000
    visibilityPercentage: 1
    centerElement: true
- tapOn:
    id: "foreman-dropdown-open-foreman-locator"
- extendedWaitUntil:
    visible:
      id: "foreman-dropdown-search-foreman-locator"
    timeout: 30000
- tapOn:
    id: "foreman-dropdown-search-foreman-locator"
- inputText: ${E2E_FOREMAN_LOCATOR_CODE}
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "foreman-dropdown-option-foreman-locator-${E2E_FOREMAN_LOCATOR_CODE_TOKEN}"
    timeout: 30000
- tapOn:
    id: "foreman-dropdown-option-foreman-locator-${E2E_FOREMAN_LOCATOR_CODE_TOKEN}"
- waitForAnimationToEnd
# Open catalog — all header fields now filled (foreman, object, locator)
- scrollUntilVisible:
    element:
      id: "foreman-catalog-open"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 20
    centerElement: true
- tapOn:
    id: "foreman-catalog-open"
- extendedWaitUntil:
    visible:
      id: "foreman-catalog-modal"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "foreman-catalog-search-input"
    timeout: 30000
- tapOn:
    id: "foreman-catalog-search-input"
- inputText: ${E2E_FOREMAN_EXPECTED_CODE}
- hideKeyboard
- extendedWaitUntil:
    visible:
      text: ${E2E_FOREMAN_EXPECTED_CODE}
    timeout: 30000
- tapOn:
    id: "foreman-catalog-qty-${E2E_FOREMAN_EXPECTED_CODE_TOKEN}"
- eraseText
- inputText: "2"
- hideKeyboard
- tapOn:
    id: "foreman-catalog-add-${E2E_FOREMAN_EXPECTED_CODE_TOKEN}"
- extendedWaitUntil:
    visible:
      text: "Открыть черновик из каталога"
    timeout: 30000
- tapOn:
    text: "Открыть черновик из каталога"
- extendedWaitUntil:
    visible:
      id: "foreman-draft-send"
    timeout: 30000
- tapOn:
    id: "foreman-draft-send"
- extendedWaitUntil:
    visible:
      text: "Отправлено"
    timeout: 30000
- tapOn:
    id: "android:id/button1"
- stopApp
