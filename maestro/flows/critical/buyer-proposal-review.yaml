appId: com.azisbek_dzhantaev.rikexpoapp
name: Buyer Proposal Review
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "auth.login.email"
    timeout: 15000
- tapOn:
    id: "auth.login.email"
- inputText: ${E2E_BUYER_EMAIL}
- tapOn:
    id: "auth.login.password"
- inputText: ${E2E_BUYER_PASSWORD}
- hideKeyboard
- tapOn:
    id: "auth.login.submit"
- extendedWaitUntil:
    visible:
      id: "profile-edit-open"
    timeout: 30000
- waitForAnimationToEnd
- scroll
- scroll
- tapOn:
    id: "profile-open-office-access"
- extendedWaitUntil:
    visible:
      id: "office-direction-open-buyer"
    timeout: 30000
- tapOn:
    id: "office-direction-open-buyer"
- runFlow:
    when:
      visible:
        id: "warehouse-fio-input"
    commands:
      - tapOn:
          id: "warehouse-fio-input"
      - eraseText
      - inputText: ${E2E_BUYER_FIO}
      - hideKeyboard
      - tapOn:
          id: "warehouse-fio-confirm"
- extendedWaitUntil:
    visible:
      id: "buyer-tab-approved"
    timeout: 30000
- tapOn:
    id: "buyer-tab-approved"
- scrollUntilVisible:
    element:
      id: "buyer-proposal-card-${E2E_BUYER_PROPOSAL_ID}"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 20
    centerElement: true
- tapOn:
    id: "buyer-proposal-card-${E2E_BUYER_PROPOSAL_ID}"
- extendedWaitUntil:
    visible:
      id: "buyer-proposal-pdf"
    timeout: 30000
- tapOn:
    id: "buyer-proposal-pdf"
- extendedWaitUntil:
    visible:
      id: "com.google.android.apps.docs:id/pdf_view"
    timeout: 45000
- stopApp
