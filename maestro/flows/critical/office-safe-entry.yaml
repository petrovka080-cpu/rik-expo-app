appId: com.azisbek_dzhantaev.rikexpoapp
name: Office Safe Entry
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "auth.login.email"
    timeout: 15000
- tapOn:
    id: "auth.login.email"
- inputText: ${E2E_AUTH_EMAIL}
- tapOn:
    id: "auth.login.password"
- inputText: ${E2E_AUTH_PASSWORD}
- hideKeyboard
- tapOn:
    id: "auth.login.submit"
- extendedWaitUntil:
    visible:
      id: "profile-edit-open"
    timeout: 30000
- waitForAnimationToEnd
- scroll
- scroll
- tapOn:
    id: "profile-open-office-access"
- extendedWaitUntil:
    visible:
      id: "office-section-directions"
    timeout: 30000
- assertVisible:
    id: "office-direction-open-buyer"
- stopApp
