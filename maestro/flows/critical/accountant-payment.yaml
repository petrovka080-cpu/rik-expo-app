appId: com.azisbek_dzhantaev.rikexpoapp
name: Accountant Payment
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "auth.login.email"
    timeout: 15000
- tapOn:
    id: "auth.login.email"
- inputText: ${E2E_ACCOUNTANT_EMAIL}
- tapOn:
    id: "auth.login.password"
- inputText: ${E2E_ACCOUNTANT_PASSWORD}
- hideKeyboard
- tapOn:
    id: "auth.login.submit"
- extendedWaitUntil:
    visible:
      id: "profile-edit-open"
    timeout: 30000
- waitForAnimationToEnd
- scroll
- scroll
- tapOn:
    id: "profile-open-office-access"
- extendedWaitUntil:
    visible:
      id: "office-direction-open-accountant"
    timeout: 30000
- tapOn:
    id: "office-direction-open-accountant"
- runFlow:
    when:
      visible:
        id: "warehouse-fio-input"
    commands:
      - tapOn:
          id: "warehouse-fio-input"
      - eraseText
      - inputText: ${E2E_ACCOUNTANT_FIO}
      - hideKeyboard
      - tapOn:
          id: "warehouse-fio-confirm"
- scrollUntilVisible:
    element:
      text: ${E2E_ACCOUNTANT_SUPPLIER}
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 20
    centerElement: true
- tapOn:
    text: ${E2E_ACCOUNTANT_SUPPLIER}
- extendedWaitUntil:
    visible:
      text: "Поставщик: ${E2E_ACCOUNTANT_SUPPLIER}"
    timeout: 30000
- assertVisible:
    text: ${E2E_ACCOUNTANT_INVOICE_NUMBER}
- assertVisible:
    text: "Статус оплаты: К ОПЛАТЕ"
- assertVisible:
    text: "Остаток к оплате"
- assertVisible:
    id: "payment-form-rest"
- assertVisible:
    text: "Банк"
- assertVisible:
    text: "Провести оплату"
- stopApp
