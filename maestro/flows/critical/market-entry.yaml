appId: com.azisbek_dzhantaev.rikexpoapp
name: Market Entry
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "auth.login.email"
    timeout: 15000
- tapOn:
    id: "auth.login.email"
- inputText: ${E2E_AUTH_EMAIL}
- tapOn:
    id: "auth.login.password"
- inputText: ${E2E_AUTH_PASSWORD}
- hideKeyboard
- tapOn:
    id: "auth.login.submit"
- extendedWaitUntil:
    visible:
      id: "profile-edit-open"
    timeout: 30000
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "profile-open-market-entry"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 20
    centerElement: true
- tapOn:
    id: "profile-open-market-entry"
- extendedWaitUntil:
    visible:
      id: "market-home-title"
    timeout: 30000
- assertVisible:
    id: "market-home-title"
- stopApp
