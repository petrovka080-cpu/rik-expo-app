appId: com.azisbek_dzhantaev.rikexpoapp
name: AI Role Screen Knowledge Foreman
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "auth.login.email"
    timeout: 15000
- tapOn:
    id: "auth.login.email"
- inputText: ${E2E_FOREMAN_EMAIL}
- tapOn:
    id: "auth.login.password"
- inputText: ${E2E_FOREMAN_PASSWORD}
- hideKeyboard
- tapOn:
    id: "auth.login.submit"
- extendedWaitUntil:
    visible:
      id: "profile-edit-open"
    timeout: 30000
- openLink: "rik://ai?context=foreman&prompt=What%20do%20I%20need%20to%20close%20on%20my%20object%3F&autoSend=1"
- extendedWaitUntil:
    visible: "AI APP KNOWLEDGE BLOCK"
    timeout: 60000
- extendedWaitUntil:
    visible: "prepare_report"
    timeout: 30000
- extendedWaitUntil:
    visible: "prepare_request"
    timeout: 30000
- extendedWaitUntil:
    visible: "prepare_act"
    timeout: 30000
- assertNotVisible: "accounting_posting"
- assertNotVisible: "full company finance"
- extendedWaitUntil:
    visible: "approval_required"
    timeout: 30000
- stopApp
