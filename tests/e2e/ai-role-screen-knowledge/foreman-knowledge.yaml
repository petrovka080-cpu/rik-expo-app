appId: com.azisbek_dzhantaev.rikexpoapp
name: AI Role Screen Knowledge Foreman
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible:
      id: "auth.login.screen"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "auth.login.email"
    timeout: 15000
- tapOn:
    id: "auth.login.email"
- inputText: ${MAESTRO_E2E_FOREMAN_EMAIL}
- tapOn:
    id: "auth.login.password"
- inputText: ${MAESTRO_E2E_FOREMAN_PASSWORD}
- hideKeyboard
- tapOn:
    id: "auth.login.submit"
- extendedWaitUntil:
    visible:
      id: "profile-edit-open"
    timeout: 30000
- openLink: "rik://ai?context=foreman&prompt=What%20do%20I%20need%20to%20close%20on%20my%20object%3F&autoSend=1"
- extendedWaitUntil:
    visible:
      id: "ai.assistant.screen"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.assistant.input"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.assistant.send"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "ai.assistant.response"
    direction: DOWN
    timeout: 90000
    visibilityPercentage: 20
    centerElement: true
- assertVisible:
    id: "ai.assistant.response"
- extendedWaitUntil:
    visible: "AI APP KNOWLEDGE BLOCK"
    timeout: 60000
- extendedWaitUntil:
    visible: "prepare_report"
    timeout: 30000
- extendedWaitUntil:
    visible: "prepare_request"
    timeout: 30000
- extendedWaitUntil:
    visible: "prepare_act"
    timeout: 30000
- assertNotVisible: "accounting_posting"
- assertNotVisible: "full company finance"
- extendedWaitUntil:
    visible: "approval_required"
    timeout: 30000
- stopApp
