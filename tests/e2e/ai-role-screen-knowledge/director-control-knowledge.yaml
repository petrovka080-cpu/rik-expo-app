appId: com.azisbek_dzhantaev.rikexpoapp
name: AI Role Screen Knowledge Director
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "auth.login.email"
    timeout: 15000
- tapOn:
    id: "auth.login.email"
- inputText: ${E2E_DIRECTOR_EMAIL}
- tapOn:
    id: "auth.login.password"
- inputText: ${E2E_DIRECTOR_PASSWORD}
- hideKeyboard
- tapOn:
    id: "auth.login.submit"
- extendedWaitUntil:
    visible:
      id: "profile-edit-open"
    timeout: 30000
- openLink: "rik://ai?context=director&prompt=What%20can%20you%20do%20on%20this%20screen%3F&autoSend=1"
- extendedWaitUntil:
    visible: "AI APP KNOWLEDGE BLOCK"
    timeout: 60000
- extendedWaitUntil:
    visible: "finance_documents"
    timeout: 30000
- extendedWaitUntil:
    visible: "warehouse_item"
    timeout: 30000
- extendedWaitUntil:
    visible: "supplier"
    timeout: 30000
- extendedWaitUntil:
    visible: "approval_required"
    timeout: 30000
- assertNotVisible: "executed successfully"
- stopApp
