appId: com.azisbek_dzhantaev.rikexpoapp
name: AI Role Screen Knowledge Contractor
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible:
      id: "auth.login.screen"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "auth.login.email"
    timeout: 15000
- tapOn:
    id: "auth.login.email"
- inputText: ${MAESTRO_E2E_CONTRACTOR_EMAIL}
- tapOn:
    id: "auth.login.password"
- inputText: ${MAESTRO_E2E_CONTRACTOR_PASSWORD}
- hideKeyboard
- tapOn:
    id: "auth.login.submit"
- extendedWaitUntil:
    visible:
      id: "profile-edit-open"
    timeout: 30000
- openLink: "rik://ai?context=contractor&prompt=What%20do%20I%20need%20to%20close%3F&autoSend=1"
- extendedWaitUntil:
    visible:
      id: "ai.assistant.screen"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.assistant.input"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.assistant.send"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.assistant.response"
    timeout: 60000
- extendedWaitUntil:
    visible: "AI APP KNOWLEDGE BLOCK"
    timeout: 60000
- extendedWaitUntil:
    visible: "own_records_only"
    timeout: 30000
- extendedWaitUntil:
    visible: "prepare_act"
    timeout: 30000
- extendedWaitUntil:
    visible: "pdf_exports"
    timeout: 30000
- assertNotVisible: "accounting_posting"
- assertNotVisible: "internal_supplier_details"
- assertNotVisible: "other_contractor_data"
- stopApp
