appId: com.azisbek_dzhantaev.rikexpoapp
name: AI Role Screen Knowledge Contractor
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"
- openLink: "rik://ai?context=contractor"
- runFlow:
    when:
      visible:
        id: "auth.login.screen"
    commands:
      - extendedWaitUntil:
          visible:
            id: "auth.login.email"
          timeout: 15000
      - tapOn:
          id: "auth.login.email"
      - inputText: ${MAESTRO_E2E_CONTRACTOR_EMAIL}
      - tapOn:
          id: "auth.login.password"
      - inputText: ${MAESTRO_E2E_CONTRACTOR_PASSWORD}
      - hideKeyboard
      - tapOn:
          id: "auth.login.submit"
      - extendedWaitUntil:
          visible:
            id: "profile-edit-open"
          timeout: 30000
      - openLink: "rik://ai?context=contractor"
- extendedWaitUntil:
    visible:
      id: "ai.assistant.screen"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.assistant.input"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.assistant.send"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.knowledge.preview"
    timeout: 30000
- assertVisible:
    id: "ai.knowledge.role"
- assertVisible:
    id: "ai.knowledge.screen"
- assertVisible:
    id: "ai.knowledge.domain"
- assertVisible:
    id: "ai.knowledge.allowed-intents"
- assertVisible:
    id: "ai.knowledge.blocked-intents"
- assertVisible:
    id: "ai.knowledge.approval-boundary"
- assertNotVisible: "accounting_posting"
- assertNotVisible: "internal_supplier_details"
- assertNotVisible: "other_contractor_data"
- tapOn:
    id: "ai.assistant.input"
- inputText: "What do I need to close?"
- hideKeyboard
- tapOn:
    id: "ai.assistant.send"
- waitForAnimationToEnd
