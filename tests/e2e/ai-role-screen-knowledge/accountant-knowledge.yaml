appId: com.azisbek_dzhantaev.rikexpoapp
name: AI Role Screen Knowledge Accountant
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible:
      id: "auth.login.screen"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "auth.login.email"
    timeout: 15000
- tapOn:
    id: "auth.login.email"
- inputText: ${MAESTRO_E2E_ACCOUNTANT_EMAIL}
- tapOn:
    id: "auth.login.password"
- inputText: ${MAESTRO_E2E_ACCOUNTANT_PASSWORD}
- hideKeyboard
- tapOn:
    id: "auth.login.submit"
- extendedWaitUntil:
    visible:
      id: "profile-edit-open"
    timeout: 30000
- openLink: "rik://ai?context=accountant"
- extendedWaitUntil:
    visible:
      id: "ai.assistant.screen"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.assistant.input"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.assistant.send"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "ai.knowledge.preview"
    timeout: 30000
- assertVisible:
    id: "ai.knowledge.role"
- assertVisible:
    id: "ai.knowledge.screen"
- assertVisible:
    id: "ai.knowledge.domain"
- assertVisible:
    id: "ai.knowledge.allowed-intents"
- assertVisible:
    id: "ai.knowledge.blocked-intents"
- assertVisible:
    id: "ai.knowledge.approval-boundary"
- extendedWaitUntil:
    visible: "company_debt"
    timeout: 30000
- extendedWaitUntil:
    visible: "payment"
    timeout: 30000
- extendedWaitUntil:
    visible: "finance_documents"
    timeout: 30000
- extendedWaitUntil:
    visible: "approval_required"
    timeout: 30000
- assertNotVisible: "confirm_supplier:allowed"
- tapOn:
    id: "ai.assistant.input"
- inputText: "Show debts and documents"
- hideKeyboard
- tapOn:
    id: "ai.assistant.send"
- scrollUntilVisible:
    element:
      id: "ai.assistant.response"
    direction: DOWN
    timeout: 90000
    visibilityPercentage: 20
    centerElement: true
- assertVisible:
    id: "ai.assistant.response"
- stopApp
